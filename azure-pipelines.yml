trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  azureSubscription: 'AzureServiceConnection'
  acrConnection: 'AzureContainerRegistryConnection'
  resourceGroupName: 'ecom-rg'
  location: 'eastus'
  aksClusterName: 'ecom-aks'
  acrName: 'ecomregistry'
  imageName: 'ecommerce-app'
  dockerTag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Publish Image
  jobs:
  - job: Build
    displayName: Build Container Image
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        cd app/backend
        npm install
      displayName: 'Install backend dependencies'

    - task: Docker@2
      displayName: 'Build and push Docker image'
      inputs:
        command: buildAndPush
        repository: '$(acrName).azurecr.io/$(imageName)'
        dockerfile: 'app/backend/Dockerfile'
        containerRegistry: '$(acrConnection)'
        tags: |
          $(dockerTag)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: DeployAKS
    displayName: Deploy application to AKS
    environment: 'aks-production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Terraform init and apply'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                cd infrastructure/azure
                terraform init -input=false
                terraform apply -auto-approve -input=false

          - task: AzureCLI@2
            displayName: 'Configure AKS credentials and deploy Kubernetes manifests'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                az aks get-credentials --resource-group $(resourceGroupName) --name $(aksClusterName) --overwrite-existing
                kubectl apply -k k8s/overlays/production
