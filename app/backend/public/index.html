<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommernce Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Ecommernce Store</h1>
      <p>Fast, scalable shopping for modern workloads.</p>
    </div>
  </header>

  <main class="container">
    <section id="storefront">
      <h2>Products</h2>
      <div id="product-list" class="cards"></div>
    </section>

    <section id="cart">
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <span id="cart-total">Total: $0.00</span>
        <button id="checkout-button" disabled>Checkout</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
