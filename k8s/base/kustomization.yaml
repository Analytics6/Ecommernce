apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
  - networkpolicy.yaml

commonLabels:
  app: ecommerce-app
  environment: production

images:
  - name: REPLACE_WITH_ACR.azurecr.io/ecommerce-app
    newName: REPLACE_WITH_ACR.azurecr.io/ecommerce-app
    newTag: latest
