apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
  - networkpolicy.yaml

commonLabels:
  app: ecommerce-app
  environment: production

configMapGenerator:
  - name: ecommerce-app-env
    literals:
      - APP_ENV=production
      - CURRENCY=USD
      - API_BASE_PATH=/api

secretGenerator:
  - name: ecommerce-app-secrets
    literals:
      - PAYMENT_PROVIDER_KEY=REPLACE_WITH_SECURE_KEY
      - DATABASE_URL=postgresql://user:password@hostname:5432/ecommerce

images:
  - name: REPLACE_WITH_ACR.azurecr.io/ecommerce-app
    newName: REPLACE_WITH_ACR.azurecr.io/ecommerce-app
    newTag: latest
