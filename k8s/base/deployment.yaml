apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: ecommerce-prod
  labels:
    app: ecommerce-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      serviceAccountName: ecommerce-app
      containers:
        - name: ecommerce-app
          image: "REPLACE_WITH_ACR.azurecr.io/ecommerce-app:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_ENV
            - name: CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: CURRENCY
            - name: API_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: API_BASE_PATH
            - name: PAYMENT_PROVIDER_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: PAYMENT_PROVIDER_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "1500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 20
          volumeMounts:
            - name: cache-volume
              mountPath: /usr/src/app/cache
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: ecommerce-pvc
